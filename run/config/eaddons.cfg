# Configuration file

artificialflower {
    # List of attribute names that will never appear on the Magic Quartz Flower. Format: generic.armor, generic.maxHealth, etc. Requires game restart. [default: ]
    S:AttributeBlackList <
     >

    # List of potion effects that will never appear on the Magic Quartz Flower. Format: modid:effectname. Requires game restart. [default: [enigmaticlegacy:blazing_strength]]
    S:EffectBlackList <
        enigmaticlegacy:blazing_strength
     >

    # The max modifier of the Magic Quartz Flower. Measures in percentage. [range: 0 ~ 100, default: 16]
    I:RandomAttributeMaxModifier=16

    # The modifier of the instantaneous effect provided by Magic Quartz Flower. Measures in percentage. [range: 0 ~ 100, default: 80]
    I:RandomInstantaneousEffectModifier=80
}


dragonbreathbow {
    # The max amount of potion effects you can apply on the arrow. [range: 1 ~ 10, default: 4]
    I:MaxPotionAmount=4

    # The damage resistance (percentage) to your own dragon breath damage. [range: 0 ~ 100, default: 60]
    I:OwnerResistance=60
}


emblemofadventurer {
    # Attack damage bonus when wearing Emblem of Adventurer. [range: 0.0 ~ 256.0, default: 2.0]
    S:AdventurerAttackDamage=2.0

    # Attack speed bonus (percentage, e.g. 10 = +10%%) when wearing Emblem of Adventurer. [range: 0.0 ~ 100.0, default: 10.0]
    S:AdventurerAttackSpeedPercent=10.0
}


etheriumcore {
    # Flat armor points. [range: 0.0 ~ 256.0, default: 12.0]
    S:ArmorBonus=12.0

    # Armor multiplier (0.2 = +20%). [range: 0.0 ~ 10.0, default: 0.2]
    S:ArmorMultiplier=0.2

    # Flat armor toughness. [range: 0.0 ~ 256.0, default: 10.0]
    S:ArmorToughnessBonus=10.0

    # Armor toughness multiplier (0.4 = +40%). [range: 0.0 ~ 10.0, default: 0.4]
    S:ArmorToughnessMultiplier=0.4

    # Cooldown after activating Etherium Shield (ticks). 20 = 1 second. 800 = 40 seconds. [range: 1 ~ 32768, default: 800]
    I:CooldownTicks=800

    # Fraction of taken damage converted to next attack bonus (0.4 = 40%). [range: 0.0 ~ 1.0, default: 0.4]
    S:DamageConversion=0.4

    # Maximum stored damage bonus. [range: 0.0 ~ 1000.0, default: 25.0]
    S:DamageConversionCap=25.0

    # Knockback resistance (0.5 = 50%). [range: 0.0 ~ 1.0, default: 0.5]
    S:KnockbackResistance=0.5

    # When Lost Engine is equipped, cooldown is multiplied by this. 0.75 = 25% reduction. [range: 0.01 ~ 1.0, default: 0.75]
    S:LostEngineCooldownFactor=0.75

    # Etherium Shield duration when activated (ticks). 500 = 25 seconds. [range: 1 ~ 32768, default: 500]
    I:ShieldDurationTicks=500

    # When wearing full Etherium set + Core, shield threshold = 40% * this (1.5 = 60%). [range: 1.0 ~ 3.0, default: 1.5]
    S:ShieldThresholdMultiplier=1.5
}


forgergem {
    # When true, only tools, swords, and armor can be made unbreakable via Forger's Gem. When false, any damageable item can be made unbreakable. [default: true]
    B:StrictUnbreakableForge=true

    # Items that can never be made unbreakable. Format: modid:itemname. Example: minecraft:elytra [default: ]
    S:UnbreakableBlacklist <
     >
}


insigniaofdespair {
    # Attack damage bonus when wearing Insignia of Despair. [range: 0.0 ~ 256.0, default: 4.0]
    S:DespairAttackDamage=4.0

    # Attack speed bonus (percentage) when wearing Insignia of Despair. [range: 0.0 ~ 100.0, default: 16.0]
    S:DespairAttackSpeedPercent=16.0

    # Knockback resistance change (percentage, negative = less resistance) when wearing Insignia of Despair. [range: -100.0 ~ 0.0, default: -5.0]
    S:DespairKnockbackResistancePercent=-5.0

    # Movement speed bonus (percentage) when wearing Insignia of Despair. [range: 0.0 ~ 100.0, default: 5.0]
    S:DespairMovementSpeedPercent=5.0
}


promiseoftheearth {
    # When damage >= this % of current health, the hit is negated (and cooldown starts). [range: 1 ~ 100, default: 80]
    I:AbilityTriggerPercent=80

    # Armor points provided by the ring. [range: 0.0 ~ 256.0, default: 5.0]
    S:Armor=5.0

    # Mining speed boost (percentage). [range: 0 ~ 1000, default: 20]
    I:BreakSpeed=20

    # Cooldown after negating a lethal hit (ticks). 20 ticks = 1 second. 1000 = 50 seconds. [range: 0 ~ 32768, default: 1000]
    I:CooldownTicks=1000

    # When wearing Cursed Ring (EnigmaticLegacy), reduce incoming damage by this % (First Curse correction). [range: 0 ~ 100, default: 25]
    I:FirstCurseResistancePercent=25

    # Fortune level bonus when mining. [range: 0 ~ 10, default: 2]
    I:FortuneBonus=2

    # When Lost Engine (EnigmaticLegacy) is equipped, Earth Promise and Hell Blade Charm cooldowns are multiplied by this. 0.75 = 25% reduction. [range: 0.01 ~ 1.0, default: 0.75]
    S:LostEngineCooldownFactor=0.75

    # Armor toughness provided by the ring. [range: 0.0 ~ 256.0, default: 2.0]
    S:Toughness=2.0
}


totemofmalice {
    # Radius (blocks) for death burst AOE damage. [range: 0.5 ~ 32.0, default: 4.0]
    S:AoeRadius=4.0

    # Base durability (uses). Each Unbreaking level adds 1 to max. [range: 1 ~ 100, default: 1]
    I:BaseDurability=1

    # Each curse enchant on the totem adds this % to death burst damage. [range: 0 ~ 500, default: 50]
    I:CurseBonusPercent=50

    # Damage bonus to illagers (percentage). 150 = +150%. [range: 0 ~ 1000, default: 150]
    I:DamageBonusPercent=150

    # Damage reduction from illagers (percentage). 50 = 50% less damage taken. [range: 0 ~ 100, default: 50]
    I:DamageReductionPercent=50

    # Death burst damage = holder max HP × this value. [range: 0.1 ~ 100.0, default: 1.5]
    S:DeathBurstMultiplier=1.5

    # Comma-separated entity registry names treated as illagers. Empty = use vanilla AbstractIllager only. [default: minecraft:evoker,minecraft:vindicator,minecraft:illusion_illager]
    S:IllagerEntityIds=minecraft:evoker,minecraft:vindicator,minecraft:illusion_illager

    # Registry name of item used to repair the totem (e.g. enigmaticlegacy:evil_essence). [default: enigmaticlegacy:evil_essence]
    S:RepairItemRegistryName=enigmaticlegacy:evil_essence
}


